<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NLHS Critical Path Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&family=IBM+Plex+Mono:wght@400;500;600;700&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e11; --bg-alt: #141418;
    --surface: #1a1a20; --surface2: #222229; --surface3: #2a2a33;
    --border: #2e2e3a; --border-hover: #3d3d50;
    --text: #eeeef0; --text-secondary: #a0a0b0; --text-muted: #5c5c6e;
    --accent: #5b8af5; --accent-light: rgba(91,138,245,0.1); --accent-glow: rgba(91,138,245,0.2);
    --red: #f87171; --red-bg: rgba(248,113,113,0.08); --red-glow: rgba(248,113,113,0.15);
    --orange: #fbbf24; --orange-bg: rgba(251,191,36,0.08);
    --green: #4ade80; --green-bg: rgba(74,222,128,0.08); --green-glow: rgba(74,222,128,0.15);
    --blue: #60a5fa; --blue-bg: rgba(96,165,250,0.08);
    --purple: #a78bfa; --purple-bg: rgba(167,139,250,0.08);
    --cyan: #22d3ee; --cyan-bg: rgba(34,211,238,0.08);
    --font-display: 'Bricolage Grotesque', serif;
    --font-mono: 'IBM Plex Mono', monospace;
    --font-body: 'Instrument Sans', sans-serif;
  }
  [data-theme="light"] {
    --bg: #f4f2ee; --bg-alt: #eae7e0;
    --surface: #ffffff; --surface2: #f7f5f1; --surface3: #edeae4;
    --border: #ddd8ce; --border-hover: #c4bfb3;
    --text: #1c1917; --text-secondary: #57534e; --text-muted: #a8a29e;
    --accent: #2563eb; --accent-light: rgba(37,99,235,0.06); --accent-glow: rgba(37,99,235,0.12);
    --red: #dc2626; --red-bg: rgba(220,38,38,0.06); --red-glow: rgba(220,38,38,0.1);
    --orange: #d97706; --orange-bg: rgba(217,119,6,0.06);
    --green: #16a34a; --green-bg: rgba(22,163,74,0.06); --green-glow: rgba(22,163,74,0.1);
    --blue: #2563eb; --blue-bg: rgba(37,99,235,0.06);
    --purple: #7c3aed; --purple-bg: rgba(124,58,237,0.06);
    --cyan: #0891b2; --cyan-bg: rgba(8,145,178,0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-body); background: var(--bg); color: var(--text);
    min-height: 100vh; overflow-x: hidden;
  }

  /* Subtle grid background */
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      radial-gradient(circle at 20% 20%, var(--accent-light) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, var(--red-bg) 0%, transparent 40%);
    opacity: 0.6;
  }
  body::after {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  [data-theme="light"] body::after {
    background-image:
      linear-gradient(rgba(0,0,0,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.025) 1px, transparent 1px);
  }

  /* Animations */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideRight { from { transform: scaleX(0); } to { transform: scaleX(1); } }
  @keyframes countUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes glowPulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
  @keyframes barGrow { from { width: 0; } }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }

  .anim { animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) both; }
  .anim-d1 { animation-delay: 0.05s; } .anim-d2 { animation-delay: 0.1s; }
  .anim-d3 { animation-delay: 0.15s; } .anim-d4 { animation-delay: 0.2s; }
  .anim-d5 { animation-delay: 0.25s; } .anim-d6 { animation-delay: 0.3s; }
  .anim-d7 { animation-delay: 0.35s; } .anim-d8 { animation-delay: 0.4s; }

  /* Nav */
  .nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(14,14,17,0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 40px; height: 60px;
    display: flex; align-items: center; justify-content: space-between;
  }
  [data-theme="light"] .nav { background: rgba(244,242,238,0.85); }
  .nav-left { display: flex; align-items: center; gap: 16px; }
  .nav-logo {
    width: 32px; height: 32px; border-radius: 8px; background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 11px; color: #fff; font-family: var(--font-display);
    letter-spacing: -0.5px;
  }
  .nav-title {
    font-family: var(--font-display); font-size: 15px; font-weight: 700;
    letter-spacing: -0.3px;
  }
  .nav-title span { color: var(--text-muted); font-weight: 400; font-size: 12px; margin-left: 8px; font-family: var(--font-body); }
  .nav-right { display: flex; gap: 8px; align-items: center; }
  .nav-link {
    padding: 7px 14px; border-radius: 8px; font-size: 12px; font-weight: 600;
    text-decoration: none; color: var(--text-secondary); border: 1px solid var(--border);
    font-family: var(--font-body); transition: all 0.2s; display: flex; align-items: center; gap: 5px;
  }
  .nav-link:hover { color: var(--text); border-color: var(--border-hover); background: var(--surface); }
  .nav-link.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .nav-link.primary:hover { filter: brightness(1.1); }
  .theme-toggle {
    width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
    background: transparent; color: var(--text-muted); cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .theme-toggle:hover { color: var(--text); background: var(--surface); }

  /* Hero Section */
  .hero {
    padding: 48px 40px 32px; position: relative; z-index: 1;
  }
  .hero-label {
    font-family: var(--font-mono); font-size: 10px; font-weight: 600;
    color: var(--accent); letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 8px;
  }
  .hero h1 {
    font-family: var(--font-display); font-size: 36px; font-weight: 800;
    letter-spacing: -1.5px; line-height: 1.1;
  }
  .hero h1 .accent { color: var(--accent); }
  .hero-sub {
    font-size: 14px; color: var(--text-muted); margin-top: 8px; max-width: 600px; line-height: 1.5;
  }
  .hero-meta {
    display: flex; gap: 20px; margin-top: 20px; font-family: var(--font-mono); font-size: 11px;
    color: var(--text-muted);
  }
  .hero-meta .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); display: inline-block; margin-right: 6px; animation: glowPulse 2s ease-in-out infinite; }

  /* KPI Strip */
  .kpi-strip {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 1px; background: var(--border); border-radius: 16px; overflow: hidden;
    margin: 0 40px; position: relative; z-index: 1;
    box-shadow: 0 4px 24px rgba(0,0,0,0.15);
  }
  .kpi {
    background: var(--surface); padding: 24px; position: relative;
    transition: background 0.2s;
  }
  .kpi:hover { background: var(--surface2); }
  .kpi-val {
    font-family: var(--font-mono); font-size: 36px; font-weight: 700;
    letter-spacing: -2px; line-height: 1; animation: countUp 0.5s ease both;
  }
  .kpi-label {
    font-size: 10px; color: var(--text-muted); text-transform: uppercase;
    letter-spacing: 1.5px; font-weight: 600; margin-top: 8px;
  }
  .kpi-sub { font-size: 11px; color: var(--text-secondary); margin-top: 4px; font-family: var(--font-mono); }
  .kpi-bar { height: 3px; border-radius: 2px; background: var(--surface3); margin-top: 12px; overflow: hidden; }
  .kpi-bar-fill { height: 100%; border-radius: 2px; animation: barGrow 1s cubic-bezier(0.22,1,0.36,1) both; transform-origin: left; }
  .kpi-glow {
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    opacity: 0; transition: opacity 0.3s;
  }
  .kpi:hover .kpi-glow { opacity: 1; }

  /* Main Grid */
  .grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 20px; padding: 32px 40px; position: relative; z-index: 1;
  }
  .grid-full { grid-column: 1 / -1; }

  /* Cards */
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    padding: 28px; position: relative; overflow: hidden;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .card:hover { border-color: var(--border-hover); box-shadow: 0 8px 32px rgba(0,0,0,0.12); }
  .card::before {
    content: ''; position: absolute; top: 0; left: 28px; right: 28px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent-glow), transparent);
    opacity: 0; transition: opacity 0.3s;
  }
  .card:hover::before { opacity: 1; }
  .card-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
  .card-title {
    font-family: var(--font-display); font-size: 16px; font-weight: 800;
    letter-spacing: -0.3px;
  }
  .card-desc { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
  .card-badge {
    font-family: var(--font-mono); font-size: 10px; font-weight: 600;
    padding: 4px 10px; border-radius: 20px; background: var(--accent-light);
    color: var(--accent); letter-spacing: 0.5px;
  }

  /* Stacked Bars */
  .sbar-row { display: flex; align-items: center; margin-bottom: 8px; gap: 12px; }
  .sbar-row:last-child { margin-bottom: 0; }
  .sbar-label {
    width: 110px; font-size: 13px; font-weight: 600; text-align: right; flex-shrink: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .sbar-track {
    flex: 1; height: 32px; background: var(--surface3); border-radius: 8px;
    overflow: hidden; display: flex; position: relative;
  }
  .sbar-seg {
    height: 100%; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 10px; font-weight: 600; color: #fff;
    transition: all 0.3s; min-width: 0; overflow: hidden; cursor: default;
    animation: barGrow 0.8s cubic-bezier(0.22,1,0.36,1) both;
    transform-origin: left;
  }
  .sbar-seg:hover { filter: brightness(1.2); }
  .sbar-seg span { padding: 0 3px; opacity: 0.9; }
  .sbar-total {
    width: 32px; font-family: var(--font-mono); font-size: 14px; font-weight: 700;
    text-align: center; flex-shrink: 0; color: var(--text);
  }

  /* Legend */
  .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 18px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

  /* Donut */
  .donut-wrap { display: flex; align-items: center; gap: 32px; }
  .donut {
    width: 180px; height: 180px; border-radius: 50%; position: relative; flex-shrink: 0;
    box-shadow: 0 0 0 1px var(--border), 0 8px 24px rgba(0,0,0,0.1);
  }
  .donut-hole {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 100px; height: 100px; border-radius: 50%; background: var(--surface);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    box-shadow: inset 0 0 12px rgba(0,0,0,0.05);
  }
  .donut-hole .dh-val {
    font-family: var(--font-mono); font-size: 32px; font-weight: 700; letter-spacing: -2px;
  }
  .donut-hole .dh-label {
    font-size: 9px; color: var(--text-muted); text-transform: uppercase;
    letter-spacing: 1.5px; font-weight: 600;
  }
  .donut-list { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .donut-item {
    display: flex; align-items: center; gap: 10px; padding: 6px 10px;
    border-radius: 8px; transition: background 0.15s;
  }
  .donut-item:hover { background: var(--surface2); }
  .donut-color { width: 14px; height: 14px; border-radius: 4px; flex-shrink: 0; }
  .donut-name { font-size: 12px; color: var(--text-secondary); flex: 1; }
  .donut-val { font-family: var(--font-mono); font-size: 14px; font-weight: 700; }
  .donut-pct { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); width: 40px; text-align: right; }

  /* Owner Detail Table */
  .dtable { width: 100%; border-collapse: collapse; }
  .dtable th {
    text-align: left; font-family: var(--font-mono); font-size: 9px; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--text-muted); font-weight: 600;
    padding: 10px 14px; border-bottom: 1px solid var(--border);
  }
  .dtable td {
    padding: 14px; border-bottom: 1px solid var(--border); font-size: 13px;
    vertical-align: middle;
  }
  .dtable tr:last-child td { border-bottom: none; }
  .dtable tr { transition: background 0.15s; }
  .dtable tr:hover { background: var(--accent-light); }
  .dt-name { font-weight: 700; font-family: var(--font-display); font-size: 14px; }
  .dt-num { font-family: var(--font-mono); font-weight: 600; font-size: 14px; }
  .dt-badge {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 3px 10px; border-radius: 20px; font-family: var(--font-mono);
    font-size: 11px; font-weight: 700; min-width: 28px;
  }
  .dt-bar-wrap { width: 100%; }
  .dt-bar { height: 8px; border-radius: 4px; background: var(--surface3); overflow: hidden; }
  .dt-bar-fill {
    height: 100%; border-radius: 4px;
    animation: barGrow 1s cubic-bezier(0.22,1,0.36,1) both;
    transform-origin: left;
  }
  .dt-bar-label { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); margin-top: 4px; }

  /* Risk Items */
  .risk-card {
    padding: 14px 18px; border-radius: 12px; margin-bottom: 10px;
    border: 1px solid var(--border); position: relative; overflow: hidden;
    transition: border-color 0.2s, transform 0.2s;
  }
  .risk-card:hover { transform: translateX(4px); }
  .risk-card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
  }
  .risk-card.overdue { background: var(--red-bg); }
  .risk-card.overdue::before { background: var(--red); }
  .risk-card.overdue:hover { border-color: var(--red); }
  .risk-card.high-pri { background: var(--orange-bg); }
  .risk-card.high-pri::before { background: var(--orange); }
  .risk-card.high-pri:hover { border-color: var(--orange); }
  .risk-card.due-soon { background: var(--blue-bg); }
  .risk-card.due-soon::before { background: var(--blue); }
  .risk-card.due-soon:hover { border-color: var(--blue); }
  .risk-top { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  .risk-task { font-family: var(--font-display); font-weight: 700; font-size: 13px; }
  .risk-tag {
    font-family: var(--font-mono); font-size: 9px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase; padding: 2px 8px;
    border-radius: 4px;
  }
  .risk-meta { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }
  .risk-goal { font-size: 12px; color: var(--text-secondary); margin-top: 6px; line-height: 1.5; }

  /* Activity Chart */
  .act-chart { display: flex; align-items: flex-end; gap: 8px; height: 140px; padding-top: 20px; }
  .act-col {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px;
    position: relative;
  }
  .act-bar {
    width: 100%; border-radius: 6px 6px 0 0; position: relative;
    transition: filter 0.2s; cursor: default;
    animation: barGrow 0.8s cubic-bezier(0.22,1,0.36,1) both;
    transform-origin: bottom;
    background: linear-gradient(180deg, var(--accent), rgba(91,138,245,0.4));
  }
  [data-theme="light"] .act-bar { background: linear-gradient(180deg, #2563eb, rgba(37,99,235,0.3)); }
  .act-bar:hover { filter: brightness(1.3); }
  .act-val {
    position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
    font-family: var(--font-mono); font-size: 11px; font-weight: 700;
    opacity: 0; transition: opacity 0.2s;
  }
  .act-col:hover .act-val { opacity: 1; }
  .act-label { font-family: var(--font-mono); font-size: 9px; color: var(--text-muted); font-weight: 500; }

  /* Section Progress */
  .sec-row { margin-bottom: 16px; }
  .sec-row:last-child { margin-bottom: 0; }
  .sec-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .sec-name { font-family: var(--font-display); font-weight: 700; font-size: 13px; }
  .sec-stat { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
  .sec-bar { height: 10px; border-radius: 5px; background: var(--surface3); overflow: hidden; }
  .sec-fill {
    height: 100%; border-radius: 5px;
    animation: barGrow 1s cubic-bezier(0.22,1,0.36,1) both;
    transform-origin: left; position: relative;
  }
  .sec-fill::after {
    content: ''; position: absolute; right: 0; top: 0; bottom: 0; width: 4px;
    border-radius: 0 5px 5px 0; background: inherit; filter: brightness(1.4);
  }

  /* Missing Goals List */
  .missing-item {
    display: flex; align-items: center; gap: 12px; padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .missing-item:last-child { border-bottom: none; }
  .missing-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--orange); flex-shrink: 0; }
  .missing-name { font-weight: 600; font-size: 13px; flex: 1; }
  .missing-owner { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }

  /* Print */
  @media print {
    body { background: #fff !important; color: #000 !important; }
    body::before, body::after { display: none; }
    .nav-right, .theme-toggle { display: none; }
    .nav { position: static; background: #fff; backdrop-filter: none; border-bottom: 2px solid #000; }
    .card { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
    .kpi-strip { box-shadow: none; }
    @page { margin: 0.4in; }
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-left">
    <div class="nav-logo">NL</div>
    <div class="nav-title">Dashboard<span>Critical Path Analytics</span></div>
  </div>
  <div class="nav-right">
    <a href="/critical_path.html" class="nav-link primary">Back to Tracker</a>
    <a href="/checklist.html" class="nav-link">Analyst Checklists</a>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle" title="Toggle theme">&#9790;</button>
  </div>
</nav>

<div class="hero anim">
  <div class="hero-label">Analytics Overview</div>
  <h1>Critical Path <span class="accent">Workload</span></h1>
  <div class="hero-sub">Real-time workload distribution, risk assessment, and progress tracking across all go-live critical path items.</div>
  <div class="hero-meta">
    <span><span class="dot"></span>Live data</span>
    <span id="heroTimestamp"></span>
  </div>
</div>

<div class="kpi-strip anim anim-d1" id="kpiStrip"></div>
<div class="grid" id="mainGrid"></div>

<script>
const API_URL = '/api/tasks';
const THEME_KEY = 'nlhs_cp_theme';
const TOKEN_KEY = 'nlhs_cp_token';
const STATUS_ORDER = ['Not Started','Scoping','Build','Dev','In Progress','Testing','Wrap-Up','Done'];
const STATUS_COLORS = {
  'Not Started':'#ef4444','Scoping':'#06b6d4','Build':'#f59e0b','Dev':'#8b5cf6',
  'In Progress':'#f97316','Testing':'#3b82f6','Wrap-Up':'#22c55e','Done':'#10b981'
};
const PRIORITY_COLORS = { 'High':'#ef4444','Medium':'#f59e0b','Low':'#6b7280','Unset':'#374151' };

let authToken = localStorage.getItem(TOKEN_KEY) || '';

function toggleTheme() {
  const html = document.documentElement;
  const isLight = html.getAttribute('data-theme') === 'light';
  html.setAttribute('data-theme', isLight ? '' : 'light');
  localStorage.setItem(THEME_KEY, isLight ? 'dark' : 'light');
  document.getElementById('themeToggle').innerHTML = isLight ? '&#9790;' : '&#9788;';
}
function loadTheme() {
  const saved = localStorage.getItem(THEME_KEY);
  if (saved === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
    document.getElementById('themeToggle').innerHTML = '&#9788;';
  }
}

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function isOverdue(t) { return t.dueDate && t.status !== 'Done' && new Date() > new Date(t.dueDate+'T23:59:59'); }
function isDueSoon(t) { if (!t.dueDate || t.status === 'Done') return false; const diff = (new Date(t.dueDate+'T23:59:59') - new Date())/(864e5); return diff >= 0 && diff <= 3; }
function fmtDueDate(d) { return d ? new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}) : ''; }
function getWeekStart(date) { const d = new Date(date); const day = d.getDay(); d.setDate(d.getDate()-(day===0?6:day-1)); d.setHours(0,0,0,0); return d; }

async function fetchTasks() {
  try {
    const h = {'Content-Type':'application/json'};
    if (authToken) h['X-Auth-Token'] = authToken;
    const res = await fetch(API_URL, { headers: h });
    if (res.ok) return await res.json();
  } catch(e) {}
  return [];
}

async function init() {
  loadTheme();
  document.getElementById('heroTimestamp').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  const tasks = await fetchTasks();
  if (!tasks || tasks.length === 0) {
    document.getElementById('mainGrid').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:80px 40px;color:var(--text-muted)"><p style="font-size:18px;font-family:var(--font-display);font-weight:800;margin-bottom:8px">No data yet</p><p>Go to the <a href="/critical_path.html" style="color:var(--accent)">Tracker</a> to get started.</p></div>';
    return;
  }
  tasks.forEach(t => { if (!t.updates) t.updates = []; if (!t.priority) t.priority = ''; if (!t.dueDate) t.dueDate = ''; });
  render(tasks);
}

// ── Precompute shared metrics ──
function computeMetrics(tasks) {
  const total = tasks.length;
  const done = tasks.filter(t => t.status==='Done').length;
  const overdue = tasks.filter(t => isOverdue(t)).length;
  const dueSoon = tasks.filter(t => isDueSoon(t)).length;
  const highPri = tasks.filter(t => t.priority==='High').length;
  const pct = total ? Math.round(done/total*100) : 0;
  const reviewed = tasks.filter(t => t.reviewed).length;
  const noGoal = tasks.filter(t => (!t.goal||!t.goal.trim()) && t.status!=='Done').length;
  const active = tasks.filter(t => !['Done','Not Started'].includes(t.status)).length;
  const epicOwners = [...new Set(tasks.map(t => t.epicOwner.split('/')[0].split('(')[0].trim()).filter(Boolean))];
  const customerOwners = [...new Set(tasks.map(t => t.analystOwner).filter(n => n && n!=='N/A' && n!=='TBD' && n!=='All'))];
  return { total, done, overdue, dueSoon, highPri, pct, reviewed, noGoal, active, epicOwners, customerOwners };
}

function renderKpiStrip(m) {
  const pctColor = m.pct >= 70 ? 'var(--green)' : m.pct >= 40 ? 'var(--orange)' : 'var(--red)';
  return `
    <div class="kpi"><div class="kpi-glow" style="background:linear-gradient(90deg,transparent,var(--accent),transparent)"></div><div class="kpi-val" style="color:var(--text)">${m.total}</div><div class="kpi-label">Total Tasks</div><div class="kpi-sub">${m.active} active</div></div>
    <div class="kpi"><div class="kpi-glow" style="background:linear-gradient(90deg,transparent,var(--green),transparent)"></div><div class="kpi-val" style="color:var(--green)">${m.pct}%</div><div class="kpi-label">Complete</div><div class="kpi-bar"><div class="kpi-bar-fill" style="width:${m.pct}%;background:${pctColor}"></div></div><div class="kpi-sub">${m.done} of ${m.total}</div></div>
    <div class="kpi"><div class="kpi-glow" style="background:linear-gradient(90deg,transparent,var(--red),transparent)"></div><div class="kpi-val" style="color:var(--red)">${m.overdue}</div><div class="kpi-label">Overdue</div><div class="kpi-sub">${m.dueSoon} due soon</div></div>
    <div class="kpi"><div class="kpi-glow" style="background:linear-gradient(90deg,transparent,var(--orange),transparent)"></div><div class="kpi-val" style="color:var(--orange)">${m.highPri}</div><div class="kpi-label">High Priority</div></div>
    <div class="kpi"><div class="kpi-glow" style="background:linear-gradient(90deg,transparent,var(--accent),transparent)"></div><div class="kpi-val" style="color:var(--accent)">${m.reviewed}</div><div class="kpi-label">Reviewed</div><div class="kpi-bar"><div class="kpi-bar-fill" style="width:${m.total?m.reviewed/m.total*100:0}%;background:var(--accent)"></div></div></div>
    <div class="kpi"><div class="kpi-glow" style="background:linear-gradient(90deg,transparent,var(--orange),transparent)"></div><div class="kpi-val" style="color:${m.noGoal>0?'var(--orange)':'var(--green)'}">${m.noGoal}</div><div class="kpi-label">Missing Goals</div></div>`;
}

function renderStackedBars(tasks, owners, total, title, desc, animClass, matchFn) {
  let html = `<div class="card anim ${animClass}">
    <div class="card-head"><div><div class="card-title">${title}</div><div class="card-desc">${desc}</div></div><div class="card-badge">${owners.length} ${title.includes('Epic')?'owners':'analysts'}</div></div>
    <div class="legend">${STATUS_ORDER.map(s => `<div class="legend-item"><div class="legend-dot" style="background:${STATUS_COLORS[s]}"></div>${s}</div>`).join('')}</div>`;
  owners.sort((a,b) => tasks.filter(t=>matchFn(t,b)).length - tasks.filter(t=>matchFn(t,a)).length);
  owners.forEach(owner => {
    const ot = tasks.filter(t => matchFn(t, owner));
    html += `<div class="sbar-row"><div class="sbar-label">${esc(owner)}</div><div class="sbar-track">`;
    STATUS_ORDER.forEach((s,i) => {
      const c = ot.filter(t => t.status===s).length;
      if (c > 0) html += `<div class="sbar-seg" style="width:${c/total*100}%;background:${STATUS_COLORS[s]};animation-delay:${i*0.05}s" title="${s}: ${c}"><span>${c}</span></div>`;
    });
    html += `</div><div class="sbar-total">${ot.length}</div></div>`;
  });
  return html + `</div>`;
}

function renderDonut(items, colorMap, total, title, desc, centerVal, centerLabel, centerColor, animClass) {
  let deg = 0;
  const conic = items.map(x => { const d = x.c/total*360; const r = `${colorMap[x.k]} ${deg}deg ${deg+d}deg`; deg+=d; return r; }).join(', ');
  return `<div class="card anim ${animClass}">
    <div class="card-head"><div><div class="card-title">${title}</div><div class="card-desc">${desc}</div></div></div>
    <div class="donut-wrap">
      <div class="donut" style="background:conic-gradient(${conic})"><div class="donut-hole"><div class="dh-val" style="color:${centerColor}">${centerVal}</div><div class="dh-label">${centerLabel}</div></div></div>
      <div class="donut-list">${items.map(x => `<div class="donut-item"><div class="donut-color" style="background:${colorMap[x.k]}"></div><div class="donut-name">${x.k}</div><div class="donut-val">${x.c}</div><div class="donut-pct">${Math.round(x.c/total*100)}%</div></div>`).join('')}</div>
    </div>
  </div>`;
}

function renderOwnerTable(tasks, epicOwners, m) {
  const maxT = Math.max(...epicOwners.map(o => tasks.filter(t=>t.epicOwner.includes(o)).length),1);
  let html = `<div class="card grid-full anim anim-d6">
    <div class="card-head"><div><div class="card-title">Owner Performance Matrix</div><div class="card-desc">Detailed workload, risk, and progress metrics per Epic owner</div></div></div>
    <table class="dtable"><thead><tr><th>Owner</th><th>Total</th><th>Done</th><th>Active</th><th>Overdue</th><th>High Pri</th><th>No Goal</th><th style="width:200px">Relative Load</th></tr></thead><tbody>`;
  epicOwners.forEach(owner => {
    const ot = tasks.filter(t => t.epicOwner.includes(owner));
    const od = ot.filter(t=>t.status==='Done').length;
    const oa = ot.filter(t=>!['Done','Not Started'].includes(t.status)).length;
    const oo = ot.filter(t=>isOverdue(t)).length;
    const oh = ot.filter(t=>t.priority==='High').length;
    const og = ot.filter(t=>(!t.goal||!t.goal.trim())&&t.status!=='Done').length;
    const bp = ot.length/maxT*100;
    const bc = oo>0?'var(--red)':oh>0?'var(--orange)':'var(--accent)';
    const completePct = ot.length ? Math.round(od/ot.length*100) : 0;
    html += `<tr>
      <td class="dt-name">${esc(owner)}</td>
      <td class="dt-num">${ot.length}</td>
      <td class="dt-num" style="color:var(--green)">${od}</td>
      <td class="dt-num">${oa}</td>
      <td>${oo>0?`<span class="dt-badge" style="background:var(--red-bg);color:var(--red)">${oo}</span>`:'<span style="color:var(--text-muted)">0</span>'}</td>
      <td>${oh>0?`<span class="dt-badge" style="background:var(--red-bg);color:var(--red)">${oh}</span>`:'<span style="color:var(--text-muted)">0</span>'}</td>
      <td>${og>0?`<span class="dt-badge" style="background:var(--orange-bg);color:var(--orange)">${og}</span>`:'<span style="color:var(--text-muted)">0</span>'}</td>
      <td><div class="dt-bar-wrap"><div class="dt-bar"><div class="dt-bar-fill" style="width:${bp}%;background:${bc}"></div></div><div class="dt-bar-label">${completePct}% complete</div></div></td>
    </tr>`;
  });
  return html + `</tbody></table></div>`;
}

function renderRiskCards(tasks) {
  const risks = tasks.filter(t => isOverdue(t));
  const highPris = tasks.filter(t => t.priority==='High' && t.status!=='Done' && !isOverdue(t));
  const dueSoons = tasks.filter(t => isDueSoon(t) && !isOverdue(t));
  if (!risks.length && !highPris.length && !dueSoons.length) return '';

  const riskCard = (t, cls, tag, tagStyle) =>
    `<div class="risk-card ${cls}"><div class="risk-top"><div class="risk-task">${esc(t.task)}</div><div class="risk-tag" style="${tagStyle}">${tag}</div></div><div class="risk-meta">${esc(t.epicOwner)} / ${esc(t.analystOwner)} &middot; ${esc(t.status)}${t.dueDate?' &middot; Due '+fmtDueDate(t.dueDate):''}</div>${t.goal?`<div class="risk-goal">${esc(t.goal)}</div>`:''}</div>`;

  let html = `<div class="card grid-full anim anim-d7">
    <div class="card-head"><div><div class="card-title">Attention Required</div><div class="card-desc">Overdue, high priority, and approaching deadlines</div></div><div class="card-badge" style="${risks.length?'background:var(--red-bg);color:var(--red)':''}">${risks.length+highPris.length+dueSoons.length} items</div></div>`;
  risks.forEach(t => html += riskCard(t, 'overdue', 'Overdue', 'background:var(--red-bg);color:var(--red)'));
  highPris.forEach(t => html += riskCard(t, 'high-pri', 'High Priority', 'background:var(--orange-bg);color:var(--orange)'));
  dueSoons.forEach(t => html += riskCard(t, 'due-soon', 'Due Soon', 'background:var(--blue-bg);color:var(--blue)'));
  return html + `</div>`;
}

function renderWeeklyActivity(tasks) {
  const allUp = [];
  tasks.forEach(t => (t.updates||[]).forEach(u => allUp.push({date:u.date,type:u.type||'manual'})));
  if (!allUp.length) return '';
  const wc = {};
  allUp.forEach(u => { const k = getWeekStart(new Date(u.date)).toISOString().slice(0,10); if(!wc[k]) wc[k]={t:0,g:0}; wc[k].t++; if(u.type==='goal-archive') wc[k].g++; });
  Object.keys(wc).forEach(k => { const d=new Date(k+'T00:00:00'); wc[k].label = d.toLocaleDateString('en-US',{month:'short',day:'numeric'}); });
  const weeks = Object.keys(wc).sort().slice(-8);
  const maxC = Math.max(...weeks.map(w=>wc[w].t),1);
  let html = `<div class="card anim anim-d8">
    <div class="card-head"><div><div class="card-title">Weekly Activity</div><div class="card-desc">Updates and goal archives over time</div></div></div>
    <div class="act-chart">`;
  weeks.forEach((w,i) => {
    const h = wc[w].t/maxC*100;
    html += `<div class="act-col"><div class="act-bar" style="height:${h}%;animation-delay:${i*0.06}s"><div class="act-val">${wc[w].t}</div></div><div class="act-label">${wc[w].label}</div></div>`;
  });
  return html + `</div></div>`;
}

function renderSectionProgress(tasks) {
  const sections = [...new Set(tasks.map(t=>t.section).filter(Boolean))];
  let html = `<div class="card anim anim-d8">
    <div class="card-head"><div><div class="card-title">Section Progress</div><div class="card-desc">Completion rate by section</div></div></div>`;
  sections.forEach(sec => {
    const st = tasks.filter(t=>t.section===sec);
    const sd = st.filter(t=>t.status==='Done').length;
    const sp = st.length ? Math.round(sd/st.length*100) : 0;
    const sc = sp>=70?'var(--green)':sp>=40?'var(--orange)':'var(--red)';
    html += `<div class="sec-row"><div class="sec-head"><div class="sec-name">${esc(sec)}</div><div class="sec-stat">${sd}/${st.length} &middot; ${sp}%</div></div><div class="sec-bar"><div class="sec-fill" style="width:${sp}%;background:${sc}"></div></div></div>`;
  });
  return html + `</div>`;
}

function renderMissingGoals(tasks) {
  const missingGoals = tasks.filter(t => (!t.goal||!t.goal.trim()) && t.status!=='Done');
  if (!missingGoals.length) return '';
  let html = `<div class="card grid-full anim anim-d8">
    <div class="card-head"><div><div class="card-title">Missing EOW Goals</div><div class="card-desc">Active tasks without an end-of-week goal set</div></div><div class="card-badge" style="background:var(--orange-bg);color:var(--orange)">${missingGoals.length} tasks</div></div>`;
  missingGoals.forEach(t => {
    html += `<div class="missing-item"><div class="missing-dot"></div><div class="missing-name">${esc(t.task)}</div><div class="missing-owner">${esc(t.epicOwner)}</div></div>`;
  });
  return html + `</div>`;
}

// ── Main render orchestrator ──
function render(tasks) {
  const m = computeMetrics(tasks);

  document.getElementById('kpiStrip').innerHTML = renderKpiStrip(m);

  const statusItems = STATUS_ORDER.map(s => ({k:s, c:tasks.filter(t=>t.status===s).length})).filter(x=>x.c>0);
  const priItems = [
    {k:'High',c:tasks.filter(t=>t.priority==='High').length},
    {k:'Medium',c:tasks.filter(t=>t.priority==='Medium').length},
    {k:'Low',c:tasks.filter(t=>t.priority==='Low').length},
    {k:'Unset',c:tasks.filter(t=>!t.priority).length}
  ].filter(x=>x.c>0);

  const html = [
    renderStackedBars(tasks, m.epicOwners, m.total, 'Epic Owner Workload', 'Tasks by status per Epic owner', 'anim-d2', (t,o) => t.epicOwner.includes(o)),
    renderStackedBars(tasks, m.customerOwners, m.total, 'Customer Workload', 'Tasks by status per customer analyst', 'anim-d3', (t,o) => t.analystOwner===o),
    renderDonut(statusItems, STATUS_COLORS, m.total, 'Status Distribution', 'Current state of all tasks', m.total, 'Tasks', 'var(--text)', 'anim-d4'),
    renderDonut(priItems, PRIORITY_COLORS, m.total, 'Priority Breakdown', 'Risk distribution across tasks', m.highPri, 'High', 'var(--red)', 'anim-d5'),
    renderOwnerTable(tasks, m.epicOwners, m),
    renderRiskCards(tasks),
    renderWeeklyActivity(tasks),
    renderSectionProgress(tasks),
    renderMissingGoals(tasks)
  ].join('');

  document.getElementById('mainGrid').innerHTML = html;
}

init();
</script>
</body>
</html>
